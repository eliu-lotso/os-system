name: Update Filtered RSS Feed

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      test:
        description: 'Test mode: force Slack to re-push all items'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate filtered RSS feed
        env:
          BARK_KEY: ${{ secrets.BARK_KEY }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.test }}" = "true" ]; then
            ARGS="--test"
          fi
          python rss_filter.py $ARGS

      - name: Commit and push updated feed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/feed.xml
          git diff --cached --quiet || git commit -m "chore: update filtered RSS feed"
          git push
